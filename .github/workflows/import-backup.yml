name: Import Supabase backup
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/import-backup.yml'
      - 'import_backup.py'
      - 'list*.txt'
permissions:
  contents: write
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run importer
        run: python3 import_backup.py
      - name: Commit results
        run: |
          git config user.name "backup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add storage database
          git commit -m "Add Supabase storage and database backup" || echo nothing to commit
          git push
